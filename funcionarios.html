<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Vales Agencia">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e8f2f8">
<link id="apple-icon" rel="apple-touch-icon" sizes="180x180">
<link id="fav" rel="icon" type="image/png" sizes="32x32">
<link id="manifest-link" rel="manifest">
<title>Registro de Vales a Bordo</title>
<meta property="og:title" content="Registro de Vales a Bordo">
<meta property="og:description" content="Grupo Agencia · Sistema interno de registro">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root { --bg:#e8f2f8; --white:#ffffff; --dark:#1a1a1a; --text:#222222; --muted:#6b7a8d; --border:#ccd8e2; --blue:#3d52a0; --green:#3a7d44; --red:#c0392b; --orange:#e67e22; --r:12px; }
html,body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased; }
.app { max-width:440px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }
#splash { position:fixed; inset:0; z-index:999; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity 0.4s ease; }
#splash.hide { opacity:0; pointer-events:none; }
.splash-icon { width:96px; height:96px; background:var(--white); border-radius:22px; box-shadow:0 8px 32px rgba(61,82,160,0.15); display:flex; align-items:center; justify-content:center; margin-bottom:20px; animation:splashPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s both; }
@keyframes splashPop { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
.splash-wordmark { text-align:center; animation:fadeUp2 0.4s ease 0.35s both; }
@keyframes fadeUp2 { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.splash-wordmark .sname { font-size:26px; font-weight:900; color:var(--dark); letter-spacing:-1px; line-height:1.1; }
.splash-tri { display:flex; gap:5px; margin-top:10px; justify-content:center; animation:fadeUp2 0.4s ease 0.45s both; }
.splash-tri span { height:6px; width:48px; border-radius:3px; }
.splash-sub { font-size:12px; color:var(--muted); font-weight:500; margin-top:10px; animation:fadeUp2 0.4s ease 0.55s both; }
.splash-loader { position:absolute; bottom:56px; width:34px; height:34px; border:3px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.view { display:none; flex-direction:column; min-height:100vh; }
.view.active { display:flex; }
.tricolor { display:flex; height:7px; width:100%; flex-shrink:0; }
.tricolor .b{flex:1;background:var(--blue)} .tricolor .g{flex:1;background:var(--green)} .tricolor .r{flex:1;background:var(--red)}
.topbar { background:var(--white); border-bottom:1px solid var(--border); padding:13px 18px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:20; flex-shrink:0; }
.topbar-brand { display:flex; flex-direction:column; gap:3px; }
.topbar-brand .name { font-size:16px; font-weight:900; color:var(--dark); letter-spacing:-0.3px; line-height:1; }
.mini-tri { display:flex; gap:3px; }
.mini-tri span { height:3px; width:20px; border-radius:2px; }
.back-btn { background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:8px 14px; font-size:12px; font-weight:600; cursor:pointer; }
.back-btn:active { opacity:0.7; }
#landing { background:var(--bg); align-items:stretch; }
.landing-hero { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 32px 24px; text-align:center; }
.brand-block { margin-bottom:32px; }
.brand-name { font-size:40px; font-weight:900; color:var(--dark); letter-spacing:-1.5px; line-height:1; }
.brand-tri { display:flex; gap:6px; margin-top:10px; justify-content:center; }
.brand-tri span { height:8px; border-radius:3px; flex:1; max-width:80px; }
.brand-sub { margin-top:16px; font-size:13px; color:var(--muted); font-weight:500; }
.install-banner { margin:0 24px 12px; background:var(--white); border:1.5px solid var(--border); border-left:4px solid var(--blue); border-radius:var(--r); padding:12px 14px; display:flex; align-items:flex-start; gap:10px; font-size:12px; color:var(--muted); line-height:1.5; }
.install-banner strong { color:var(--dark); display:block; font-size:13px; margin-bottom:2px; }
.install-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; padding:0; margin-left:auto; flex-shrink:0; }
.landing-actions { padding:0 24px 48px; display:flex; flex-direction:column; gap:10px; }
.btn-blue { background:var(--blue); color:var(--white); border:none; border-radius:var(--r); padding:17px 24px; font-family:'Inter',sans-serif; font-size:15px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; width:100%; transition:opacity 0.15s,transform 0.1s; }
.btn-blue:active { transform:scale(0.97); opacity:0.9; }
.btn-outline { background:var(--white); color:var(--dark); border:1.5px solid var(--border); border-radius:var(--r); padding:17px 24px; font-family:'Inter',sans-serif; font-size:15px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; width:100%; transition:border-color 0.15s,transform 0.1s; }
.btn-outline:active { transform:scale(0.97); border-color:var(--blue); }
.form-body { flex:1; padding:24px 20px; display:flex; flex-direction:column; gap:20px; background:var(--bg); overflow-y:auto; }
.field-label { display:block; font-size:11px; font-weight:700; letter-spacing:1px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
.select-field { width:100%; background:var(--white); border:1.5px solid var(--border); border-radius:var(--r); padding:15px 16px; color:var(--text); font-family:'Inter',sans-serif; font-size:15px; font-weight:500; outline:none; appearance:none; transition:border-color 0.2s; }
.select-field:focus { border-color:var(--blue); }
.date-chip { background:var(--white); border:1.5px solid var(--border); border-radius:var(--r); padding:14px 16px; font-size:14px; color:var(--muted); font-weight:500; display:flex; align-items:center; gap:8px; }
.saldo-chip { border-radius:var(--r); padding:14px 16px; display:flex; align-items:center; justify-content:space-between; }
.saldo-chip.ok { background:#eaf5ee; border:1.5px solid #b8dfc4; }
.saldo-chip.warn { background:#fff8e6; border:1.5px solid #f0d080; }
.saldo-chip.empty { background:#fdecea; border:1.5px solid #f0b0aa; }
.saldo-chip .slbl { font-size:12px; font-weight:600; color:var(--muted); }
.saldo-chip .sval { font-size:22px; font-weight:900; }
.saldo-chip.ok .sval{color:var(--green)} .saldo-chip.warn .sval{color:var(--orange)} .saldo-chip.empty .sval{color:var(--red)}
.counter-wrap { background:var(--white); border:1.5px solid var(--border); border-radius:var(--r); padding:24px 20px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
.counter-center { flex:1; text-align:center; }
.counter-num { font-size:72px; font-weight:900; color:var(--blue); line-height:1; letter-spacing:-3px; }
.counter-unit { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-top:4px; }
.cnt-btn { width:60px; height:60px; border-radius:12px; border:none; font-size:28px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform 0.1s,opacity 0.15s; user-select:none; -webkit-user-select:none; }
.cnt-btn:active { transform:scale(0.88); }
.cnt-plus{background:var(--blue);color:var(--white)} .cnt-minus{background:var(--bg);color:var(--dark);border:1.5px solid var(--border) !important}
.cnt-btn:disabled { opacity:0.25; cursor:default; }
.form-footer { padding:12px 20px 36px; background:var(--bg); flex-shrink:0; }
.btn-submit { background:var(--blue); color:var(--white); border:none; border-radius:var(--r); padding:18px; width:100%; font-family:'Inter',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:transform 0.1s,opacity 0.15s; }
.btn-submit:active{transform:scale(0.97)} .btn-submit:disabled{opacity:0.35;cursor:default}
#success{background:var(--bg)}
.success-inner { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:40px 28px; text-align:center; }
.success-check { width:84px; height:84px; background:var(--green); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:38px; animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
.success-title{font-size:26px;font-weight:900;color:var(--dark);letter-spacing:-0.5px}
.success-sub{font-size:14px;color:var(--muted);line-height:1.6}
.success-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;width:100%;text-align:left}
.sc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.sc-row:last-child{border-bottom:none}
.sc-lbl{color:var(--muted);font-weight:500;font-size:12px}
.sc-val{font-weight:700;color:var(--dark)}
.sc-val.big{font-size:26px;font-weight:900;color:var(--blue)}
.sc-val.saldo-ok{color:var(--green)} .sc-val.saldo-warn{color:var(--orange)} .sc-val.saldo-cero{color:var(--red)}
.success-btns{width:100%;display:flex;flex-direction:column;gap:10px}
</style>
</head>
<body>
<div id="splash">
  <div class="splash-icon" id="splashIconEl"></div>
  <div class="splash-wordmark"><div class="sname">Grupo<br>Agencia</div></div>
  <div class="splash-tri"><span style="background:#3d52a0"></span><span style="background:#3a7d44"></span><span style="background:#c0392b"></span></div>
  <div class="splash-sub">Vales a Bordo · Registro</div>
  <div class="splash-loader"></div>
</div>
<div class="app">

<!-- LANDING -->
<div id="landing" class="view active">
  <div class="tricolor"><div class="b"></div><div class="g"></div><div class="r"></div></div>
  <div class="landing-hero">
    <div class="brand-block">
      <div class="brand-name">Grupo<br>Agencia</div>
      <div class="brand-tri"><span style="background:var(--blue)"></span><span style="background:var(--green)"></span><span style="background:var(--red)"></span></div>
      <div class="brand-sub">Registro de Vales a Bordo</div>
    </div>
  </div>
  <div id="installBanner" class="install-banner" style="display:none">
    <div><strong>📲 Instalá como app</strong>Tocá <em>Compartir</em> → <em>"Agregar a inicio"</em></div>
    <button class="install-close" onclick="this.parentElement.parentElement.style.display='none'">✕</button>
  </div>
  <div class="landing-actions">
    <button class="btn-blue" onclick="goTo('form')">✏️ &nbsp;Registrar Vales</button>
  </div>
</div>

<!-- FORM -->
<div id="formView" class="view">
  <div class="tricolor"><div class="b"></div><div class="g"></div><div class="r"></div></div>
  <div class="topbar">
    <div class="topbar-brand">
      <div class="name">Grupo Agencia</div>
      <div class="mini-tri"><span style="background:var(--blue)"></span><span style="background:var(--green)"></span><span style="background:var(--red)"></span></div>
    </div>
    <button class="back-btn" onclick="goTo('landing')">← Volver</button>
  </div>
  <div class="form-body">
    <div>
      <label class="field-label">Tu nombre</label>
      <select class="select-field" id="selNombre" onchange="onNombreChange()">
        <option value="">— Seleccioná tu nombre —</option>
        <option>Danielle Fontes</option><option>Juan Chapitel</option><option>Bruno Casaravilla</option>
        <option>Nicolas Rodriguez</option><option>Nicolas Olivera</option>
        <option>Florencia Rodriguez</option><option>Carolina Odonne</option>
      </select>
    </div>
    <div id="saldoInfo" style="display:none">
      <label class="field-label">Tus vales disponibles</label>
      <div id="saldoChip" class="saldo-chip ok">
        <span class="slbl">Saldo actual</span>
        <span class="sval" id="saldoVal">0</span>
      </div>
    </div>
    <div>
      <label class="field-label">Fecha</label>
      <div class="date-chip">📅 &nbsp;<span id="fechaTxt"></span></div>
    </div>
    <div>
      <label class="field-label">Cantidad de vales entregados hoy</label>
      <div class="counter-wrap">
        <button class="cnt-btn cnt-minus" id="btnMenos" onclick="cambiar(-1)" disabled>−</button>
        <div class="counter-center">
          <div class="counter-num" id="numVal">0</div>
          <div class="counter-unit">VALES</div>
        </div>
        <button class="cnt-btn cnt-plus" id="btnMas" onclick="cambiar(1)">+</button>
      </div>
    </div>
  </div>
  <div class="form-footer">
    <button class="btn-submit" id="btnEnviar" onclick="enviar()" disabled>Confirmar Registro →</button>
  </div>
</div>

<!-- SUCCESS -->
<div id="success" class="view">
  <div class="tricolor"><div class="b"></div><div class="g"></div><div class="r"></div></div>
  <div class="success-inner">
    <div class="success-check">✓</div>
    <h2 class="success-title">¡Registro guardado!</h2>
    <p class="success-sub">Los vales fueron registrados correctamente.</p>
    <div class="success-card" id="successCard"></div>
    <div class="success-btns">
      <button class="btn-blue" onclick="nuevoRegistro()">Registrar más →</button>
      <button class="btn-outline" onclick="goTo('landing')">← Inicio</button>
    </div>
  </div>
</div>

</div>
<script>
function generarIcono(size){const c=document.createElement('canvas');c.width=c.height=size;const ctx=c.getContext('2d');function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}const rad=size*0.18;ctx.fillStyle='#e8f2f8';rr(0,0,size,size,rad);ctx.fill();ctx.fillStyle='#ffffff';rr(size*0.1,size*0.1,size*0.8,size*0.8,rad*0.5);ctx.fill();ctx.fillStyle='#3d52a0';ctx.font=`900 ${size*0.42}px Arial Black,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('G',size/2,size*0.41);const bw=(size*0.8-size*0.08)/3,bh=size*0.09,by=size*0.72,bx=size*0.1+size*0.04;['#3d52a0','#3a7d44','#c0392b'].forEach((col,i)=>{ctx.fillStyle=col;rr(bx+i*(bw+size*0.04),by,bw,bh,bh/2);ctx.fill();});return c.toDataURL('image/png');}
const icon192=generarIcono(192),icon512=generarIcono(512);
document.getElementById('apple-icon').href=generarIcono(180);
document.getElementById('fav').href=generarIcono(32);
const img=new Image();img.src=icon192;img.style.cssText='width:68px;height:68px;border-radius:14px;';document.getElementById('splashIconEl').appendChild(img);
const manifest={name:'Vales Agencia',short_name:'Vales',start_url:window.location.href,display:'standalone',orientation:'portrait',background_color:'#e8f2f8',theme_color:'#e8f2f8',icons:[{src:icon192,sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:icon512,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
document.getElementById('manifest-link').href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/json'}));
window.addEventListener('load',()=>{setTimeout(()=>{const s=document.getElementById('splash');s.classList.add('hide');setTimeout(()=>s.remove(),450);},1500);});
if(!window.navigator.standalone&&!window.matchMedia('(display-mode:standalone)').matches){setTimeout(()=>{document.getElementById('installBanner').style.display='flex';},1800);}

const CLAVE_REG='grupoagencia_vales_v2', CLAVE_STOCK='grupoagencia_stock_v1';
// ── DATOS COMPARTIDOS VIA GOOGLE SHEETS ──
let _cache = {registros:[], stock:{}};
let _cacheLoaded = false;

async function sincronizar(){
  try {
    const r = await fetch(API_URL);
    const d = await r.json();
    _cache.registros = d.registros || [];
    _cache.stock = d.stock || {};
    _cacheLoaded = true;
  } catch(e){ console.error('Error sync',e); }
}
function cargar(){ return _cache.registros; }
function cargarStock(){ return _cache.stock; }

async function guardarRegistro(reg){
  _cache.registros.push(reg);
  await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'agregarRegistro',...reg})});
}

function hoy(){return new Date().toISOString().slice(0,10);}
function fmtDate(iso){const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;}
function fmtHora(){return new Date().toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit'});}
function getSaldo(nombre){const stock=cargarStock();const asignado=stock[nombre]||0;const usado=cargar().filter(r=>r.nombre===nombre).reduce((s,r)=>s+r.cantidad,0);return asignado-usado;}

function goTo(vista){
  document.querySelector('.view.active')?.classList.remove('active');
  const ids={form:'formView',success:'success',landing:'landing'};
  document.getElementById(ids[vista]||vista).classList.add('active');
  if(vista==='form')const API_URL='https://script.google.com/macros/s/AKfycbw3wsGYsmMAcnL4CP1VysaCDp0vkmwpEHM5hqh-4DftB65_1xmbo8rJIBcrq3fw6KglrQ/exec';
initForm();
  window.scrollTo(0,0);
}

let contador=0;
async function initForm(){
  await sincronizar();
  contador=0;
  document.getElementById('numVal').textContent=0;
  document.getElementById('btnMenos').disabled=true;
  document.getElementById('btnEnviar').disabled=true;
  document.getElementById('selNombre').value='';
  document.getElementById('saldoInfo').style.display='none';
  document.getElementById('fechaTxt').textContent=new Date().toLocaleDateString('es-UY',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function onNombreChange(){
  const nombre=document.getElementById('selNombre').value;
  if(!nombre){document.getElementById('saldoInfo').style.display='none';validarForm();return;}
  const saldo=getSaldo(nombre);
  const chip=document.getElementById('saldoChip');
  document.getElementById('saldoVal').textContent=saldo;
  chip.className='saldo-chip '+(saldo>5?'ok':saldo>0?'warn':'empty');
  document.getElementById('saldoInfo').style.display='block';
  if(contador>saldo){contador=Math.max(0,saldo);document.getElementById('numVal').textContent=contador;}
  document.getElementById('btnMas').disabled=saldo<=0||contador>=saldo;
  validarForm();
}
function cambiar(d){
  const nombre=document.getElementById('selNombre').value;
  const saldo=nombre?getSaldo(nombre):999;
  contador=Math.max(0,Math.min(contador+d,saldo));
  document.getElementById('numVal').textContent=contador;
  document.getElementById('btnMenos').disabled=contador===0;
  document.getElementById('btnMas').disabled=nombre&&contador>=saldo;
  validarForm();
}
function validarForm(){
  const nombre=document.getElementById('selNombre').value;
  const saldo=nombre?getSaldo(nombre):0;
  document.getElementById('btnEnviar').disabled=!nombre||contador===0||saldo<=0;
}
async function enviar(){
  const nombre=document.getElementById('selNombre').value;
  if(!nombre||contador===0)return;
  const saldo=getSaldo(nombre);
  if(contador>saldo){alert(`No tenés suficientes vales. Saldo: ${saldo}`);return;}
  const reg={id:Date.now().toString(),nombre,fecha:hoy(),cantidad:contador,hora:fmtHora()};
  await guardarRegistro(reg);
  const nuevoSaldo=saldo-contador;
  const cls=nuevoSaldo>5?'saldo-ok':nuevoSaldo>0?'saldo-warn':'saldo-cero';
  document.getElementById('successCard').innerHTML=`
    <div class="sc-row"><span class="sc-lbl">Funcionario</span><span class="sc-val">${reg.nombre}</span></div>
    <div class="sc-row"><span class="sc-lbl">Fecha</span><span class="sc-val">${fmtDate(reg.fecha)}</span></div>
    <div class="sc-row"><span class="sc-lbl">Hora</span><span class="sc-val">${reg.hora}</span></div>
    <div class="sc-row"><span class="sc-lbl">Vales entregados</span><span class="sc-val big">${reg.cantidad}</span></div>
    <div class="sc-row"><span class="sc-lbl">Saldo restante</span><span class="sc-val ${cls}">${nuevoSaldo}</span></div>`;
  goTo('success');
}
function nuevoRegistro(){goTo('form');}
const API_URL='https://script.google.com/macros/s/AKfycbw3wsGYsmMAcnL4CP1VysaCDp0vkmwpEHM5hqh-4DftB65_1xmbo8rJIBcrq3fw6KglrQ/exec';
initForm();
</script>
</body>
</html>
